# 학생 실습 자동 채점 CI
# *-practice 브랜치로 PR 을 올리면 자동으로 채점합니다.
#
# 채점 항목:
# 1. 빌드 성공 여부 (컴파일)
# 2. TODO 제거 여부 (실습 완료 확인)
# 3. 정답 코드와 비교 (diff)
name: Grade Practice

on:
  pull_request:
    branches:
      - 'web/*-practice'
      - 'layered/*-practice'
      - 'shop/*-practice'
      - 'feature/*-practice'

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  grade:
    name: Auto Grade
    runs-on: ubuntu-latest

    steps:
      # ========== 준비 ==========
      - name: Checkout student code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 히스토리 (정답 브랜치 비교용)

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Determine answer branch
        id: branches
        run: |
          TARGET="${{ github.base_ref }}"
          # *-practice → 정답 브랜치 (practice 제거)
          ANSWER="${TARGET%-practice}"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "answer=$ANSWER" >> "$GITHUB_OUTPUT"
          echo "📋 Target: $TARGET → Answer: $ANSWER"

      # ========== 채점 1: 빌드 ==========
      - name: "Grade 1: Build"
        id: build
        run: |
          if ./gradlew build -x test --no-daemon 2>build-error.log; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
            echo "✅ 빌드 성공"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
            echo "❌ 빌드 실패"
            cat build-error.log
          fi

      # ========== 채점 2: TODO 체크 ==========
      - name: "Grade 2: TODO check"
        id: todo
        if: always()
        run: |
          TODO_COUNT=$(grep -r "// TODO" src/main --include="*.java" | wc -l | tr -d ' ')
          echo "count=$TODO_COUNT" >> "$GITHUB_OUTPUT"

          if [ "$TODO_COUNT" -eq 0 ]; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
            echo "✅ 모든 TODO 완료 (남은 TODO: 0개)"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
            echo "❌ 미완료 TODO ${TODO_COUNT}개 남음:"
            grep -rn "// TODO" src/main --include="*.java"
          fi

      # ========== 채점 3: 정답 비교 ==========
      - name: "Grade 3: Compare with answer"
        id: compare
        if: always()
        run: |
          ANSWER="${{ steps.branches.outputs.answer }}"

          # 정답 브랜치가 존재하는지 확인
          if ! git rev-parse "origin/$ANSWER" >/dev/null 2>&1; then
            echo "result=skip" >> "$GITHUB_OUTPUT"
            echo "⚠️ 정답 브랜치(origin/$ANSWER)를 찾을 수 없어 비교를 건너뜁니다"
            exit 0
          fi

          # 정답 브랜치와 학생 코드 비교 (src/main 만)
          DIFF=$(git diff "origin/$ANSWER" -- src/main/ 2>/dev/null || true)

          if [ -z "$DIFF" ]; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
            echo "match=100" >> "$GITHUB_OUTPUT"
            echo "✅ 정답과 완전 일치!"
          else
            # 변경된 파일 수와 라인 수 계산
            CHANGED_FILES=$(git diff --name-only "origin/$ANSWER" -- src/main/ | wc -l | tr -d ' ')
            DIFF_LINES=$(echo "$DIFF" | grep "^[+-]" | grep -v "^[+-][+-][+-]" | wc -l | tr -d ' ')

            # 정답 브랜치의 총 라인 수 기준으로 일치율 계산
            ANSWER_LINES=$(git diff --stat "origin/$ANSWER" -- src/main/ | tail -1 | grep -oE '[0-9]+ insertion|[0-9]+ deletion' | grep -oE '[0-9]+' | paste -sd+ | bc 2>/dev/null || echo "0")
            if [ "$ANSWER_LINES" -gt 0 ]; then
              MATCH=$((100 - (DIFF_LINES * 100 / (ANSWER_LINES + DIFF_LINES))))
              [ "$MATCH" -lt 0 ] && MATCH=0
            else
              MATCH=0
            fi

            echo "match=$MATCH" >> "$GITHUB_OUTPUT"
            echo "changed_files=$CHANGED_FILES" >> "$GITHUB_OUTPUT"
            echo "diff_lines=$DIFF_LINES" >> "$GITHUB_OUTPUT"

            if [ "$DIFF_LINES" -le 5 ]; then
              echo "result=pass" >> "$GITHUB_OUTPUT"
              echo "✅ 거의 일치 (차이: ${DIFF_LINES}줄)"
            else
              echo "result=partial" >> "$GITHUB_OUTPUT"
              echo "⚠️ 정답과 차이 있음 (${CHANGED_FILES}개 파일, ${DIFF_LINES}줄 차이)"
              echo ""
              echo "--- 차이점 ---"
              git diff "origin/$ANSWER" -- src/main/ | head -200
            fi
          fi

      # ========== 채점 4: 테스트 ==========
      - name: "Grade 4: Tests"
        id: test
        if: steps.build.outputs.result == 'pass'
        run: |
          if ./gradlew test --no-daemon 2>test-error.log; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
            echo "✅ 테스트 통과"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
            echo "❌ 테스트 실패"
            cat test-error.log | tail -30
          fi

      # ========== 결과 리포트 ==========
      - name: Post grade report
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const build = '${{ steps.build.outputs.result }}';
            const todo = '${{ steps.todo.outputs.result }}';
            const todoCount = '${{ steps.todo.outputs.count }}';
            const compare = '${{ steps.compare.outputs.result }}';
            const match = '${{ steps.compare.outputs.match }}' || '-';
            const test = '${{ steps.test.outputs.result }}' || 'skip';
            const answer = '${{ steps.branches.outputs.answer }}';
            const target = '${{ steps.branches.outputs.target }}';

            const icon = (r) => r === 'pass' ? '✅' : r === 'partial' ? '⚠️' : r === 'skip' ? '⏭️' : '❌';
            const label = (r) => r === 'pass' ? 'Pass' : r === 'partial' ? 'Partial' : r === 'skip' ? 'Skip' : 'Fail';

            // 점수 계산
            let score = 0;
            let total = 0;

            // 빌드: 40점
            total += 40;
            if (build === 'pass') score += 40;

            // TODO: 30점
            total += 30;
            if (todo === 'pass') score += 30;

            // 정답 비교: 20점
            if (compare !== 'skip') {
              total += 20;
              if (compare === 'pass') score += 20;
              else if (compare === 'partial') score += 10;
            }

            // 테스트: 10점
            total += 10;
            if (test === 'pass') score += 10;

            const percentage = Math.round(score / total * 100);
            const grade = percentage >= 90 ? 'A' : percentage >= 80 ? 'B' : percentage >= 70 ? 'C' : percentage >= 60 ? 'D' : 'F';

            const body = `## 📝 자동 채점 결과

            **브랜치**: \`${target}\` (정답: \`${answer}\`)
            **점수**: **${score}/${total}점 (${percentage}%)** — Grade **${grade}**

            | 항목 | 배점 | 결과 | 비고 |
            |------|------|------|------|
            | ${icon(build)} 빌드 (컴파일) | 40점 | ${label(build)} | 코드가 정상적으로 컴파일되는지 |
            | ${icon(todo)} TODO 완료 | 30점 | ${label(todo)} | 남은 TODO: ${todoCount}개 |
            | ${icon(compare)} 정답 비교 | 20점 | ${label(compare)} | 일치율: ${match}% |
            | ${icon(test)} 테스트 통과 | 10점 | ${label(test)} | 단위/통합 테스트 |

            ---
            ${percentage >= 90 ? '🎉 훌륭합니다!' : percentage >= 70 ? '👍 잘 했습니다! 조금만 더 수정해보세요.' : '💪 다시 한번 확인해보세요. 힌트를 참고하세요.'}

            > 정답 확인: \`git diff ${target}..${answer}\`
            `.replace(/^            /gm, '');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
