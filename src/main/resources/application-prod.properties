# ========== PROD Profile ==========
# Production: stability and performance first

server.port=80

# Log level: WARN and above only
logging.level.com.inspire12.backend=INFO
logging.level.org.springframework.web=WARN

# Actuator: expose only health and info in prod
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ========== JPA + SQLite ==========
spring.datasource.url=jdbc:sqlite:./data/app.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
