spring.application.name=backend

# 활성 프로필 설정 (dev, prod)
# 실행 시 -Dspring.profiles.active=prod 로 변경 가능
spring.profiles.active=dev

# ========== 네이버 API 설정 ==========
# TODO: 네이버 개발자 센터에서 발급받은 키를 설정하세요
# https://developers.naver.com 에서 애플리케이션 등록
naver.client-id=${NAVER_CLIENT_ID:your-client-id}
naver.client-secret=${NAVER_CLIENT_SECRET:your-client-secret}
