spring.application.name=backend

# Active profile (dev, prod)
# Override with: -Dspring.profiles.active=prod
spring.profiles.active=dev

# ========== Naver API ==========
# Register app at https://developers.naver.com to get keys
# Override with env vars or application-dev.properties
naver.client-id=${NAVER_CLIENT_ID:your-client-id}
naver.client-secret=${NAVER_CLIENT_SECRET:your-client-secret}
