# ========== DEV 프로필 ==========
# 개발 환경: 디버깅 편의성 우선

server.port=8080

# 로그 레벨: 애플리케이션 DEBUG, Spring INFO
logging.level.com.inspire12.backend=DEBUG
logging.level.org.springframework.web=DEBUG

# Actuator: 개발에서는 모든 엔드포인트 노출
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ========== JPA + SQLite ==========
# TODO: SQLite 데이터소스 URL 을 설정하세요
# spring.datasource.url=jdbc:sqlite:????
# spring.datasource.driver-class-name=????

# TODO: Hibernate 설정을 추가하세요
# spring.jpa.database-platform=org.hibernate.community.dialect.????
# spring.jpa.hibernate.ddl-auto=????
# spring.jpa.show-sql=????

# 초기 데이터 삽입 (data.sql 실행)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
