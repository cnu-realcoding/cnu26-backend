# ========== DEV Profile ==========
# Development: debug-friendly settings

server.port=8080

# Log level: application DEBUG, Spring DEBUG
logging.level.com.inspire12.backend=DEBUG
logging.level.org.springframework.web=DEBUG

# Actuator: expose all endpoints in dev
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ========== JPA + SQLite ==========
# SQLite file-based DB (project root: data/app.db)
spring.datasource.url=jdbc:sqlite:./data/app.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Hibernate settings
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Initial data (run data.sql on startup)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
